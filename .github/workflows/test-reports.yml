name: Performance & Security Reports

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  perf-report:
    name: Performance Report
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: devatlas
          POSTGRES_PASSWORD: devatlas
          POSTGRES_DB: devatlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Push database schema
        run: pnpm db:push
        env:
          DATABASE_URL: postgresql://devatlas:devatlas@localhost:5432/devatlas

      - name: Seed database
        run: pnpm db:seed
        env:
          DATABASE_URL: postgresql://devatlas:devatlas@localhost:5432/devatlas

      - name: Build project
        run: pnpm build
        env:
          DATABASE_URL: postgresql://devatlas:devatlas@localhost:5432/devatlas

      - name: Run performance tests
        id: perf
        run: node scripts/perf-test.js 2>&1 | tee perf-report.txt || true
        env:
          DATABASE_URL: postgresql://devatlas:devatlas@localhost:5432/devatlas
          PORT: 3456

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-report
          path: perf-report.txt
          retention-days: 30

  security-report:
    name: Security Report
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: devatlas
          POSTGRES_PASSWORD: devatlas
          POSTGRES_DB: devatlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Push database schema
        run: pnpm db:push
        env:
          DATABASE_URL: postgresql://devatlas:devatlas@localhost:5432/devatlas

      - name: Seed database
        run: pnpm db:seed
        env:
          DATABASE_URL: postgresql://devatlas:devatlas@localhost:5432/devatlas

      - name: Build project
        run: pnpm build
        env:
          DATABASE_URL: postgresql://devatlas:devatlas@localhost:5432/devatlas

      - name: Run security tests
        id: security
        run: node scripts/security-test.js 2>&1 | tee security-report.txt || true
        env:
          DATABASE_URL: postgresql://devatlas:devatlas@localhost:5432/devatlas
          PORT: 3456

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: security-report.txt
          retention-days: 30
