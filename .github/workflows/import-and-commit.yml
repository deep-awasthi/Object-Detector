name: Import and Commit Articles on Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  import-articles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run import and build
        run: npm run import
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage index files, sitemaps, RSS, generated articles, and assets
          git add src/articles/ public/ public/articles/
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-import and rebuild articles [skip ci]"
            git push origin main
          else
            echo "No changes in generated articles to commit."
          fi
