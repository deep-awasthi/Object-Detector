version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "tmp"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "uuid"
        update-types: ["version-update:semver-patch"]
