version: "3.9"

services:
  # ──────────────── PostgreSQL ────────────────
  postgres:
    image: postgres:16-alpine
    container_name: deepclone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deepclone
      POSTGRES_USER: deepclone
      POSTGRES_PASSWORD: ${DB_PASSWORD:-deepclone_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepclone -d deepclone"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepclone-network

  # ──────────────── Qdrant Vector DB ────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: deepclone-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"    # HTTP API
      - "6334:6334"    # gRPC
    networks:
      - deepclone-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ──────────────── Ollama (Local LLM) ────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: deepclone-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # Uncomment if you have NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - deepclone-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ──────────────── Spring Boot API ────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deepclone-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_PASSWORD: ${DB_PASSWORD:-deepclone_secret}
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-in-production-must-be-512-bits}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      STORAGE_PATH: /app/data/uploads
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-qwen2.5:latest}
    volumes:
      - upload_data:/app/data/uploads
      - api_logs:/app/logs
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - deepclone-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ──────────────── Frontend (React/Vite) ────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deepclone-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - deepclone-network

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  upload_data:
  api_logs:

networks:
  deepclone-network:
    driver: bridge
